name: Bug report
description: Report a reproducible defect in the roster, adapters, scripts, or docs.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide enough detail to reproduce it.
        Do **not** report security vulnerabilities here — follow
        [SECURITY.md](../blob/main/SECURITY.md) and use private reporting.
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What actually happened?
      placeholder: Describe the incorrect behavior you saw.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: The minimal steps to reproduce, including exact commands.
      placeholder: |
        1. Edit swarm/roster.json ...
        2. Run python scripts/build_adapters.py ...
        3. See error ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected client or adapter
      description: Which integration or component is affected?
      options:
        - Claude Code (.claude/agents)
        - Codex (.codex/agents)
        - Cursor (.cursor/agents)
        - OpenCode (.opencode/agents)
        - Canonical prompts (canonical/agents)
        - Roster (swarm/roster.json)
        - Scripts (build_adapters.py / validate_swarm.py)
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: The release version (see CHANGELOG.md) or the commit SHA.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation commands run
      description: |
        Paste the output of the validation commands you ran.
      placeholder: |
        $ python scripts/build_adapters.py --check
        ...
        $ python scripts/validate_swarm.py
        ...
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I did not manually edit any generated agent files (they are generator-owned).
          required: true
        - label: This report contains no secrets, credentials, PII, or proprietary material.
          required: true
        - label: I have searched existing issues and this is not a duplicate.
          required: true
  - type: dropdown
    id: breaking
    attributes:
      label: Does this involve a breaking change (agent id, title, or hierarchy)?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true
